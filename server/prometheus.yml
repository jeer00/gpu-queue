global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: homeserver-node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: job-api
    static_configs:
      - targets:
          - job-api:8080

  - job_name: gaming-pc-node
    static_configs:
      - targets:
          - gamingpc.local:9100

  - job_name: gpu-worker
    static_configs:
      - targets:
          - gamingpc.local:9101
